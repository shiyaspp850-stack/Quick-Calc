<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz Game</title>
    <style>
        /* ബാക്ക്ഗ്രൗണ്ട് കളർ നല്ലൊരു നീല കളറിലേക്ക് മാറ്റി */
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #0f4c81; /* ആഴമുള്ള നീല നിറം */
            padding: 20px; 
        }
        .game-box { 
            max-width: 450px; 
            margin: 50px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3); 
        }
        /* ക്വസ്റ്റ്യൻ ബോക്സ് കളറും നീല തീമിന് അനുയോജ്യമാക്കി */
        .question { 
            background: #2575fc; 
            color: white; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 20px; 
        }
        .options-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }
        button { 
            padding: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 8px; 
            border: 2px solid #2575fc; 
            background: #fff; 
            color: #2575fc;
            cursor: pointer; 
            transition: 0.3s;
        }
        /* ബട്ടണിൽ തൊടുമ്പോൾ ഉള്ള കളർ മാറ്റം */
        button:hover { 
            background: #2575fc; 
            color: white; 
        }
        .score { 
            margin-top: 20px; 
            font-size: 18px; 
            color: #333; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-box">
    <h2>കണക്ക് കളി 🧠🔢</h2>
    <div class="question" id="question">Loading...</div>
    
    <div class="options-grid">
        <button onclick="checkAnswer(this)" id="opt0"></button>
        <button onclick="checkAnswer(this)" id="opt1"></button>
        <button onclick="checkAnswer(this)" id="opt2"></button>
        <button onclick="checkAnswer(this)" id="opt3"></button>
    </div>

    <div class="score" id="score">SCORE: 0</div>
</div>

<script>
    // നിന്റെ പഴയ ചോദ്യങ്ങളും നീ തന്ന പുതിയ ചോദ്യങ്ങളും (ഉത്തരങ്ങൾ സഹിതം) ഇവിടെ ചേർത്തിട്ടുണ്ട്
    const mathQuestions = [
        { q: "5 + 7 = എത്ര?", options: ["10", "12", "14", "11"], correct: "12" },
        { q: "12 - 4 = എത്ര?", options: ["6", "8", "9", "7"], correct: "8" },
        { q: "3 x 5 = എത്ര?", options: ["15", "12", "18", "20"], correct: "15" },
        { q: "20 ÷ 4 = എത്ര?", options: ["4", "6", "5", "10"], correct: "5" },
        { q: "50 + 50 = എത്ര?", options: ["90", "100", "150", "200"], correct: "100" },
        // പുതിയ ചോദ്യം 1 (732 + 490 = 1222)
        { q: "732 + 490 = എത്ര?", options: ["1122", "1222", "1322", "1212"], correct: "1222" },
        // പുതിയ ചോദ്യം 2 (574 + 120 = 694)
        { q: "574 + 120 = എത്ര?", options: ["684", "694", "794", "594"], correct: "694" }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        if (currentQ < mathQuestions.length) {
            let data = mathQuestions[currentQ];
            document.getElementById("question").innerText = data.q;
            for (let i = 0; i < 4; i++) {
                document.getElementById("opt" + i).innerText = data.options[i];
            }
            document.getElementById("score").innerText = "SCORE: " + score + " / " + mathQuestions.length;
        } else {
            document.getElementById("question").innerText = "🎉 കളി കഴിഞ്ഞു! 🎉";
            document.getElementById("score").innerHTML = "<b>നിങ്ങളുടെ ആകെ സ്കോർ: " + score + " / " + mathQuestions.length + "</b>";
            document.querySelector(".options-grid").style.display = "none";
        }
    }

    function checkAnswer(btn) {
        if (btn.innerText === mathQuestions[currentQ].correct) {
            alert("ശരിയുത്തരം! 🎉");
            score++;
        } else {
            alert("തെറ്റാണ്! ❌ ശരിക്കുള്ള ഉത്തരം: " + mathQuestions[currentQ].correct);
        }
        currentQ++;
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
